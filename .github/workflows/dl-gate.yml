name: Phase-0 OWL-DL gate (deep, periodic)

# The HEAVY BFO/CCO conformance gate -- ROBOT + HermiT over the full CCO import -- run over every live PFP
# honesty-ladder ABox (clean / ice / orphan / snowflake) against the vendored signed TBoxes (dl-gate/tbox/).
# This is SEPARATE from the deploy audit on purpose: the every-push protection is the fast DL FLOOR
# (docs/js/vendor/gm/test/gm.dlfloor.test.mjs, #3 + referential integrity, milliseconds). This deep gate is the
# periodic / on-demand check the review prescribed (the reasoner exploits continuant/occurrent disjointness the
# floor cannot). It does NOT block the deploy; a RED here is a signal to the coordinator.
#
# CCO: vendored at dl-gate/vendor/cco/CommonCoreOntologiesMerged.ttl (the 2026-04-04 merged build WITH BFO
# axioms inline -- 960 obo:BFO_ refs incl. the continuant/occurrent disjointness the gate exploits, and the
# EXACT build the gate was validated GREEN against). The job uses it directly -- no external dependency. NB: the
# upstream CCO "merged" release (v2.1) carries only ~77 BFO refs (BFO not fully merged), so pointing at it would
# silently strip the disjointness; that is why CCO travels with the gate. Set repo var CCO_TTL_URL ONLY to
# deliberately override with a different merged-Turtle source.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  dl-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Java (ROBOT/HermiT)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download ROBOT
        run: |
          curl -L -o robot.jar https://github.com/ontodev/robot/releases/latest/download/robot.jar
          test -s robot.jar
      - name: Provision CCO (vendored merged Turtle, BFO inline)
        env:
          CCO_TTL_URL: ${{ vars.CCO_TTL_URL }}
        run: |
          if [ -n "${CCO_TTL_URL}" ]; then
            echo "CCO_TTL_URL override set -- downloading: ${CCO_TTL_URL}"
            curl -L -o cco.ttl "${CCO_TTL_URL}"
          else
            cp dl-gate/vendor/cco/CommonCoreOntologiesMerged.ttl cco.ttl   # the validated build, BFO inline
          fi
          test -s cco.ttl
          echo "CCO BFO refs: $(grep -c 'obo/BFO_' cco.ttl) (expect ~960 -- a low count means BFO is not merged)"
      - name: Run the Phase-0 DL gate over all four ABoxes
        run: |
          ROBOT_JAR="$PWD/robot.jar" CCO_TTL="$PWD/cco.ttl" bash dl-gate/run-dl-gate.sh
