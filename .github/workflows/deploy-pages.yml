name: Deploy PFP site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # OUTPUT-FIDELITY AUDIT -- the Auditor gate. The deploy job depends on this, so the site publishes ONLY if
  # every emitted artifact's claims are witnessed (the claim-ledger) AND the suite asserts those claims. This
  # is enforcement inside the only path to publish, default-deny: a manifest that would say something it cannot
  # witness blocks the deploy. The audit.test step also proves the Auditor itself is non-vacuous (flags the
  # pre-fix bug, passes the fixed output), so a regression to a hollow gate also denies the deploy.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Auditor acceptance (non-vacuous -- flags the pre-fix bug, passes the fix)
        run: node docs/js/audit/audit.test.mjs
      - name: Output-fidelity gate (every emitted manifest's claims are witnessed)
        run: node docs/js/audit/gate.mjs
      - name: Capstone smoke (field-content assertions)
        run: node docs/js/vendor/ssm/test/capstone.smoke.mjs
      - name: runStar verify (functional layer)
        run: node docs/js/vendor/ssm/test/runstar.verify.mjs
      - name: GM output-fidelity (the materialized graph's claims read against the emitted triples)
        run: node docs/js/vendor/gm/test/gm.verify.mjs
      - name: Set up Python (a REAL RDF parser for the published graph)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install rdflib
        run: pip install rdflib
      - name: GM real-parse (the published Turtle MUST parse in a real RDF parser, not just look like RDF)
        run: |
          node docs/js/vendor/gm/test/gm.emit.mjs > gm-graph.ttl
          python -c "import rdflib, sys; g = rdflib.Graph(); g.parse('gm-graph.ttl', format='turtle'); print('rdflib parsed', len(g), 'triples'); sys.exit(0 if len(g) > 0 else 1)"
      - name: GM raw-front output-fidelity (the raw-front graph's claims read against the emitted triples)
        run: node docs/js/vendor/gm/test/gm-raw.verify.mjs
      - name: GM raw-front real-parse (the raw-front Turtle MUST parse in a real RDF parser)
        run: |
          node docs/js/vendor/gm/test/gm-raw.emit.mjs > gm-raw-graph.ttl
          python -c "import rdflib, sys; g = rdflib.Graph(); g.parse('gm-raw-graph.ttl', format='turtle'); print('rdflib parsed', len(g), 'triples'); sys.exit(0 if len(g) > 0 else 1)"
      - name: Status-page audit (instance 2 -- the live status manifest's claims are witnessed)
        run: node docs/js/audit/status-audit.test.mjs

  deploy:
    needs: audit
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
